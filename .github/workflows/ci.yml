name: CI
on: [push, pull_request]
permissions:
  contents: read
jobs:
  build:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: '**/requirements*.txt'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pip install -r requirements.txt
      # Check requirements.txt contains production requirements.
      - run: ./manage.py --help
      - run: pip install -r requirements_dev.txt
      - name: Build static files
        shell: bash
        run: |
          env NODE_ENV=production node build.js
          env DJANGO_ENV=production python manage.py collectstatic --noinput -v2
      # The database and its test database must use the case- and accent-sensitive
      # utf8mb4_0900_as_cs collation (see settings.py). The mysql:8.0 image's server
      # default is utf8mb4_0900_ai_ci, so create the database explicitly; otherwise
      # its columns clash with the connection collation ("illegal mix of collations").
      - name: Create database
        run: >-
          mysql -h 127.0.0.1 -P ${{ job.services.mysql.ports[3306] }} -u root -proot
          -e "CREATE DATABASE digitalbuying CHARACTER SET utf8mb4 COLLATE utf8mb4_0900_as_cs"
      - name: Run checks and tests
        env:
          PYTHONWARNINGS: error
          DATABASE_URL: mysql://root:root@127.0.0.1:${{ job.services.mysql.ports[3306] }}/digitalbuying
        shell: bash
        run: |
          ./manage.py migrate
          ./manage.py makemigrations --check --dry-run base case_studies guidelines modules navigation sponsors streams
          ./manage.py check --fail-level WARNING
          coverage run --source core,base,case_studies,guidelines,modules,navigation,sponsors,streams manage.py test
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: true
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306/tcp
